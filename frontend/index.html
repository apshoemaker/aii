<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aii — Artemis II Tracker</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hud">
    <div id="hud-title">ARTEMIS II</div>
    <div id="hud-met"><span class="label">MET</span> <span id="met-value">—</span></div>
    <div id="hud-earth"><span class="label">Earth</span> <span id="earth-dist">—</span></div>
    <div id="hud-moon"><span class="label">Moon</span> <span id="moon-dist">—</span></div>
    <div id="hud-velocity"><span class="label">Velocity</span> <span id="velocity-value">—</span></div>
    <div id="hud-status">
      <span id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <div id="timeline"></div>

  <div id="live-feed">
    <div class="feed-header">
      <span class="feed-title">NASA LIVE</span>
      <button id="feed-toggle" title="Toggle live feed">▽</button>
    </div>
    <div class="feed-embed" id="feed-embed">
      <iframe src="https://www.youtube.com/embed/6RwfNBtepa4?autoplay=1&mute=1&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <button id="refresh-btn" title="Refresh ephemeris from Horizons"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg></button>
  <div id="chat-container"></div>

  <script>
    document.getElementById('feed-toggle').addEventListener('click', () => {
      document.getElementById('live-feed').classList.toggle('collapsed');
    });
    document.querySelector('.feed-header').addEventListener('click', (e) => {
      if (e.target.id !== 'feed-toggle') {
        document.getElementById('live-feed').classList.toggle('collapsed');
      }
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
